<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carti Vamp Player</title>
    <!-- Google Fonts for Vampire/Gothic Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="vamp-container">
        <div class="blood-drip"></div>
        <div class="blood-drip-2"></div>
        <div class="blood-drip-3"></div>

        <header>
            <h1 class="vamp-title">WHOLE LOTTA RED</h1>
            <p class="subtitle">Random Carti & Leaks</p>
        </header>

        <main class="player-box">
            <div class="artwork-container">
                <img id="track-art" src="https://upload.wikimedia.org/wikipedia/en/2/27/Playboi_Carti_-_Whole_Lotta_Red.png" alt="Album Art">
                <div class="vinyl-overlay" id="vinyl-overlay"></div>
            </div>

            <div class="track-info">
                <h2 id="track-title">Loading...</h2>
                <p id="track-status">Connecting to the underworld...</p>
            </div>

            <div class="controls">
                <button id="btn-prev" class="control-btn" disabled>&#9664;&#9664;</button> <!-- Previous (just loads new random) -->
                <button id="btn-play" class="control-btn play-btn" disabled>&#9658;</button> <!-- Play / Pause -->
                <button id="btn-next" class="control-btn" disabled>&#9654;&#9654;</button> <!-- Next -->
            </div>

            <div class="volume-control">
                <span>🔈</span>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
                <span>🔊</span>
            </div>
        </main>

        <!-- Hidden YouTube Player -->
        <div id="yt-player-container" style="display: none;">
            <div id="yt-player"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
